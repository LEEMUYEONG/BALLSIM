<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BALLSIM</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container" id="mainScreen">

    <h1>⚾ BALLSIM ⚾</h1>

    <p>Baseball Management Simulator</p>

    <button id="btnPlayGame">경기 시작</button>
    <button id="btnSeason">시즌 시작</button>
    <button id="btnTeam">팀 관리</button>
    <button id="btnPlayers">선수 데이터</button>
    <button id="btnSettings">설정</button>

</div>

<div id="gameScreen" style="display:none;">

    <div class="game-layout">

        <div class="log-panel">
            <div id="logBox"></div>
        </div>

        <div class="info-panel">
            <table id="inningBoard" class="scoreboard"></table>

            <div class="diamond-wrap">
                <svg class="diamond-lines" viewBox="0 0 200 200">
                    <polyline points="100,180 180,100 100,20 20,100 100,180" />
                </svg>
                <div class="diamond">
                    <div class="base-label" id="label2"></div>
                    <div class="base base-2" id="base2"></div>

                    <div class="base-label" id="label3"></div>
                    <div class="base base-3" id="base3"></div>

                    <div class="base-label" id="label1"></div>
                    <div class="base base-1" id="base1"></div>

                    <div class="base-label" id="labelHome"></div>
                    <div class="base base-home" id="baseHome"></div>
                </div>
            </div>

            <div class="count-row">
                <div class="count-group">
                    <span class="count-label">B</span>
                    <div class="dot" id="ball1"></div>
                    <div class="dot" id="ball2"></div>
                    <div class="dot" id="ball3"></div>
                </div>
                <div class="count-group">
                    <span class="count-label">S</span>
                    <div class="dot" id="strike1"></div>
                    <div class="dot" id="strike2"></div>
                </div>
                <div class="count-group">
                    <span class="count-label">O</span>
                    <div class="dot" id="out1"></div>
                    <div class="dot" id="out2"></div>
                </div>
            </div>

            <button id="btnNextPitch">다음 공</button>
            <button id="btnNextBatter">다음 타자</button>
            <button id="btnNextHalfInning">다음 이닝(초/말)</button>
            <button id="btnBackToMain">메인으로</button>
        </div>

    </div>

</div>

<script src="log.js"></script>
<script src="player.js"></script>
<script src="game.js"></script>
<script src="main.js"></script>

</body>
</html>
